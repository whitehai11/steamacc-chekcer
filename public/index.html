<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEAM BOT CORE // MASTER CONTROL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b0b0e;
            --bg-secondary: #121216;
            --bg-card: #1a1a22;
            --accent-green: #00ff66;
            --accent-orange: #ff9900;
            --accent-red: #ff3333;
            --accent-blue: #00b0ff;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #8f90a6;
            --glass-bg: rgba(26, 26, 34, 0.65);
            --glass-blur: blur(12px);
            --shadow-glow: 0 0 15px rgba(0, 176, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 176, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(0, 255, 102, 0.03) 0px, transparent 50%);
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue);
        }

        header {
            background: rgba(18, 18, 22, 0.8);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title-container {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ffffff 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-connected {
            background-color: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse-green 2s infinite;
        }

        .status-disconnected {
            background-color: var(--accent-red);
            box-shadow: 0 0 10px var(--accent-red);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 51, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0); }
        }

        main {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
            padding: 24px;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
            flex-grow: 1;
        }

        @media (max-width: 1024px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        .left-col {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Glassmorphism Cards */
        .card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--accent-blue);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Form Controls */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .form-group input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: var(--shadow-glow);
            background: rgba(0, 0, 0, 0.6);
        }

        button {
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            border-radius: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue) 0%, #0077ff 100%);
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 176, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 176, 255, 0.5);
            background: linear-gradient(135deg, #00c3ff 0%, #0088ff 100%);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Logging Console */
        .console {
            background: #050507;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            height: 280px;
            padding: 16px;
            overflow-y: auto;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 12px;
            color: var(--accent-green);
            line-height: 1.6;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .console-line {
            margin-bottom: 8px;
            word-break: break-all;
            animation: fadeIn 0.2s ease-out;
        }

        .console-timestamp {
            color: var(--text-secondary);
            margin-right: 8px;
        }

        /* Bot Fleet Section */
        .fleet-card {
            min-height: 500px;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 13px;
        }

        th {
            background: rgba(18, 18, 22, 0.9);
            color: var(--text-secondary);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        tr {
            transition: background 0.3s ease;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Account Column */
        .account-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .account-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--accent-blue);
            background: #252530;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .account-avatar svg {
            width: 24px;
            height: 24px;
            fill: var(--text-secondary);
        }

        .account-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .account-name {
            font-weight: 700;
            color: #ffffff;
        }

        .account-steamid {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: 'Fira Code', monospace;
        }

        /* Select Dropdown styling */
        .select-wrapper {
            position: relative;
        }

        .farming-select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 10px 32px 10px 12px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            width: 100%;
            transition: all 0.3s ease;
        }

        .farming-select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: var(--shadow-glow);
        }

        .select-wrapper::after {
            content: '▼';
            font-size: 8px;
            color: var(--text-secondary);
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            position: absolute;
            pointer-events: none;
        }

        /* Status badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-ready {
            background: rgba(0, 255, 102, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(0, 255, 102, 0.3);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.1);
        }

        .badge-cooldown {
            background: rgba(255, 51, 51, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(255, 51, 51, 0.3);
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.1);
            animation: pulse-border-red 2s infinite;
        }

        @keyframes pulse-border-red {
            0% { border-color: rgba(255, 51, 51, 0.3); }
            50% { border-color: rgba(255, 51, 51, 0.8); }
            100% { border-color: rgba(255, 51, 51, 0.3); }
        }

        /* CSREP Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            min-width: 200px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
        }

        .stat-icon {
            font-size: 12px;
        }

        .stat-value {
            font-weight: 600;
            color: #ffffff;
        }

        /* Trust rating visual colors */
        .trust-badge {
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            text-transform: uppercase;
        }

        .trust-green { background: rgba(0, 255, 102, 0.2); color: var(--accent-green); }
        .trust-yellow { background: rgba(255, 153, 0, 0.2); color: var(--accent-orange); }
        .trust-red { background: rgba(255, 51, 51, 0.2); color: var(--accent-red); }
        .trust-unknown { background: rgba(255, 255, 255, 0.1); color: var(--text-secondary); }

        /* Action buttons */
        .btn-action {
            background: rgba(0, 176, 255, 0.08);
            border: 1px solid rgba(0, 176, 255, 0.3);
            color: var(--accent-blue);
            padding: 8px 12px;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 6px;
        }

        .btn-action:hover:not(:disabled) {
            background: rgba(0, 176, 255, 0.2);
            color: #ffffff;
            border-color: var(--accent-blue);
            box-shadow: 0 0 8px rgba(0, 176, 255, 0.3);
        }

        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Spinner animation */
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-fleet {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title-container">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#00b0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="#00b0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="#00b0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1>Steam Bot Core // Master Control</h1>
        </div>
        <div id="connection-status" class="status-badge">
            <span id="status-dot" class="status-dot status-disconnected"></span>
            <span id="status-text">Disconnected</span>
        </div>
    </header>

    <main>
        <!-- Left Column -->
        <div class="left-col">
            <!-- Bot Registration Card -->
            <section class="card">
                <h2 class="card-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    Bot registrieren
                </h2>
                <form id="bot-form">
                    <div class="form-group" style="margin-bottom: 16px;">
                        <label for="username">Steam Account Name</label>
                        <input type="text" id="username" placeholder="z.B. my_steam_bot" required autocomplete="username">
                    </div>
                    <div class="form-group" style="margin-bottom: 16px;">
                        <label for="password">Steam Passwort</label>
                        <input type="password" id="password" placeholder="••••••••••••" required autocomplete="current-password">
                    </div>
                    <div class="form-group" style="margin-bottom: 24px;">
                        <label for="steamid64">SteamID64 (17-stellig)</label>
                        <input type="text" id="steamid64" placeholder="z.B. 76561198000000000" pattern="\d{17}" title="Die SteamID64 muss genau 17 Ziffern lang sein." required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">
                        <span>🤖 Bot Flotte erweitern</span>
                    </button>
                </form>
            </section>

            <!-- Live Logging Console -->
            <section class="card">
                <h2 class="card-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="4 17 10 11 4 5"></polyline>
                        <line x1="12" y1="19" x2="20" y2="19"></line>
                    </svg>
                    System Logs // Realtime Stream
                </h2>
                <div id="console-stream" class="console">
                    <div class="console-line">
                        <span class="console-timestamp">[SYSTEM]</span> Konsole initialisiert. Warte auf Verbindung...
                    </div>
                </div>
            </section>
        </div>

        <!-- Right Column: Bot Fleet -->
        <section class="card fleet-card">
            <h2 class="card-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                Bot-Flotten Management
            </h2>
            
            <div class="table-responsive">
                <table id="fleet-table">
                    <thead>
                        <tr>
                            <th>Account</th>
                            <th>Farming Target</th>
                            <th>CS2 Queue Status</th>
                            <th>CSREP.GG Live-Statistiken</th>
                            <th>Aktionen</th>
                        </tr>
                    </thead>
                    <tbody id="fleet-body">
                        <tr>
                            <td colspan="5" class="empty-fleet">Lade Bot-Flotte...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Socket.IO Client Script integration -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // DOM Elements
        const connectionStatus = document.getElementById('connection-status');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const botForm = document.getElementById('bot-form');
        const consoleStream = document.getElementById('console-stream');
        const fleetBody = document.getElementById('fleet-body');

        // Connect to Socket.IO Server
        const socket = io();

        // Helper to format date timestamps
        function getTimestamp() {
            const now = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            return `[${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}]`;
        }

        // Add log line to console
        function logToConsole(message, type = 'log') {
            const line = document.createElement('div');
            line.className = 'console-line';
            if (type === 'error') {
                line.style.color = 'var(--accent-red)';
            } else if (type === 'info') {
                line.style.color = 'var(--accent-blue)';
            }
            
            const timestamp = document.createElement('span');
            timestamp.className = 'console-timestamp';
            timestamp.textContent = getTimestamp();
            
            line.appendChild(timestamp);
            line.appendChild(document.createTextNode(message));
            
            consoleStream.appendChild(line);
            consoleStream.scrollTop = consoleStream.scrollHeight;
        }

        // Socket Connection Events
        socket.on('connect', () => {
            statusDot.className = 'status-dot status-connected';
            statusText.textContent = 'Connected';
            logToConsole('Erfolgreich mit dem Control-Server verbunden.', 'info');
        });

        socket.on('disconnect', () => {
            statusDot.className = 'status-dot status-disconnected';
            statusText.textContent = 'Disconnected';
            logToConsole('Verbindung zum Control-Server verloren.', 'error');
        });

        // Listen for log stream
        socket.on('botStatus', (data) => {
            const botStr = data.username ? `[${data.username}] ` : '';
            logToConsole(`${botStr}${data.status}`);
        });

        socket.on('log', (message) => {
            logToConsole(message);
        });

        // Listen for data updates
        socket.on('accountsUpdate', (accounts) => {
            renderFleetTable(accounts);
        });

        socket.on('update-bots', (accounts) => {
            renderFleetTable(accounts);
        });

        socket.on('statsFetched', (data) => {
            logToConsole(`Statistiken für Bot '${data.username}' erfolgreich geladen.`);
        });

        // Render Bot Fleet Table
        function renderFleetTable(accounts) {
            if (!accounts || accounts.length === 0) {
                fleetBody.innerHTML = `
                    <tr>
                        <td colspan="5" class="empty-fleet">Keine Bots registriert. Verwende das Formular links, um Bots hinzuzufügen.</td>
                    </tr>
                `;
                return;
            }

            fleetBody.innerHTML = '';

            accounts.forEach(bot => {
                const tr = document.createElement('tr');
                tr.style.animation = 'fadeIn 0.3s ease-out';

                // --- 1. Account Cell ---
                const accountCell = document.createElement('td');
                accountCell.className = 'account-cell';
                
                const avatarDiv = document.createElement('div');
                avatarDiv.className = 'account-avatar';
                // Inline SVG fallback profile picture
                avatarDiv.innerHTML = `
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M12 14c-6.1 0-8 4-8 4v2h16v-2s-1.9-4-8-4z"/>
                    </svg>
                `;
                
                const infoDiv = document.createElement('div');
                infoDiv.className = 'account-info';
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'account-name';
                nameSpan.textContent = bot.username;
                
                const idSpan = document.createElement('span');
                idSpan.className = 'account-steamid';
                idSpan.textContent = bot.steamId64;
                
                infoDiv.appendChild(nameSpan);
                infoDiv.appendChild(idSpan);
                accountCell.appendChild(avatarDiv);
                accountCell.appendChild(infoDiv);

                // --- 2. Farming Target Cell ---
                const targetCell = document.createElement('td');
                const selectWrapper = document.createElement('div');
                selectWrapper.className = 'select-wrapper';
                
                const select = document.createElement('select');
                select.className = 'farming-select';
                
                const optionCards = document.createElement('option');
                optionCards.value = 'cards';
                optionCards.textContent = '🃏 SAMMELKARTEN (MAX LEVEL)';
                optionCards.selected = bot.farmingMode === 'cards';
                
                const optionHours = document.createElement('option');
                optionHours.value = 'hours';
                optionHours.textContent = '🎮 CS2 STUNDEN-IDLE';
                optionHours.selected = bot.farmingMode === 'hours';
                
                select.appendChild(optionCards);
                select.appendChild(optionHours);
                
                select.addEventListener('change', async (e) => {
                    const newMode = e.target.value;
                    try {
                        select.disabled = true;
                        const response = await fetch('/api/farming/mode', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: bot.username, mode: newMode })
                        });
                        if (!response.ok) {
                            throw new Error('Fehler beim Ändern des Farming-Modus');
                        }
                        logToConsole(`Farming-Modus für '${bot.username}' auf '${newMode}' gesetzt.`, 'info');
                    } catch (err) {
                        logToConsole(err.message, 'error');
                        select.value = bot.farmingMode; // rollback value
                    } finally {
                        select.disabled = false;
                    }
                });
                
                selectWrapper.appendChild(select);
                targetCell.appendChild(selectWrapper);

                // --- 3. Queue Status Cell ---
                const statusCell = document.createElement('td');
                const badge = document.createElement('span');
                
                if (bot.cooldownMinutes && bot.cooldownMinutes > 0) {
                    badge.className = 'badge badge-cooldown';
                    badge.innerHTML = `⚠️ COOLDOWN: ${bot.cooldownMinutes} MINUTEN`;
                } else {
                    badge.className = 'badge badge-ready';
                    badge.innerHTML = `✅ READY TO QUEUE`;
                }
                statusCell.appendChild(badge);

                // --- 4. CSREP Stats Cell ---
                const statsCell = document.createElement('td');
                const stats = bot.stats || { premier_elo: 0, cs2_hours: 0, inventory_value: 0, trust_rating: 'Unknown' };
                
                const statsGrid = document.createElement('div');
                statsGrid.className = 'stats-grid';
                
                // Elo
                const eloItem = document.createElement('div');
                eloItem.className = 'stat-item';
                eloItem.innerHTML = `<span class="stat-icon">🏆</span> <span class="stat-value">${stats.premier_elo || 0}</span>`;
                
                // Hours
                const hoursItem = document.createElement('div');
                hoursItem.className = 'stat-item';
                hoursItem.innerHTML = `<span class="stat-icon">🕒</span> <span class="stat-value">${stats.cs2_hours || 0}h</span>`;
                
                // Value
                const valItem = document.createElement('div');
                valItem.className = 'stat-item';
                valItem.innerHTML = `<span class="stat-icon">🪙</span> <span class="stat-value">${stats.inventory_value || 0} €</span>`;
                
                // Trust
                const trustItem = document.createElement('div');
                trustItem.className = 'stat-item';
                
                let trustClass = 'trust-unknown';
                const trustLower = String(stats.trust_rating).toLowerCase();
                if (trustLower.includes('green')) trustClass = 'trust-green';
                else if (trustLower.includes('yellow') || trustLower.includes('orange')) trustClass = 'trust-yellow';
                else if (trustLower.includes('red')) trustClass = 'trust-red';
                
                trustItem.innerHTML = `
                    <span class="stat-icon">🛡️</span> 
                    <span class="trust-badge ${trustClass}">${stats.trust_rating || 'Unknown'}</span>
                `;
                
                statsGrid.appendChild(eloItem);
                statsGrid.appendChild(hoursItem);
                statsGrid.appendChild(valItem);
                statsGrid.appendChild(trustItem);
                statsCell.appendChild(statsGrid);

                // --- 5. Actions Cell ---
                const actionsCell = document.createElement('td');
                const actionBtn = document.createElement('button');
                actionBtn.className = 'btn-action';
                actionBtn.innerHTML = `<span>🔄 Stats abrufen</span>`;
                
                actionBtn.addEventListener('click', async () => {
                    try {
                        actionBtn.disabled = true;
                        actionBtn.innerHTML = `<span class="spinner"></span> <span>Lade...</span>`;
                        
                        const response = await fetch('/api/bot/fetch-stats', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ steamId64: bot.steamId64 })
                        });
                        
                        if (!response.ok) {
                            throw new Error('API-Fehler beim Abrufen der Statistiken');
                        }
                    } catch (err) {
                        logToConsole(err.message, 'error');
                    } finally {
                        actionBtn.disabled = false;
                        actionBtn.innerHTML = `<span>🔄 Stats abrufen</span>`;
                    }
                });
                
                actionsCell.appendChild(actionBtn);

                // Append cells to row
                tr.appendChild(accountCell);
                tr.appendChild(targetCell);
                tr.appendChild(statusCell);
                tr.appendChild(statsCell);
                tr.appendChild(actionsCell);
                
                fleetBody.appendChild(tr);
            });
        }

        // Bot Registration Submission
        botForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const steamidInput = document.getElementById('steamid64');
            
            const data = {
                username: usernameInput.value.trim(),
                password: passwordInput.value.trim(),
                steamId64: steamidInput.value.trim()
            };

            const submitBtn = botForm.querySelector('button[type="submit"]');
            const originalBtnHtml = submitBtn.innerHTML;

            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = `<span class="spinner"></span> <span>Registriere...</span>`;
                
                const response = await fetch('/api/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || 'Registrierung fehlgeschlagen');
                }
                
                logToConsole(`Bot '${data.username}' erfolgreich registriert!`, 'info');
                
                // Clear fields
                usernameInput.value = '';
                passwordInput.value = '';
                steamidInput.value = '';
                
            } catch (err) {
                logToConsole(`Fehler: ${err.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnHtml;
            }
        });
    </script>
</body>
</html>
