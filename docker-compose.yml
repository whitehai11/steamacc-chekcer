version: '3.8'

services:
  asf:
    image: justarchi/archisteamfarm:latest
    container_name: asf-sentinel
    restart: unless-stopped
    volumes:
      - ./asf-config:/app/config
      - ./asf-plugins:/app/plugins
    ports:
      - "1242:1242"
    environment:
      - ASF_ARGS=--no-ui

  web:
    build: .
    container_name: web-sentinel
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./config.json:/app/config.json
      - ./accounts.json:/app/accounts.json
      - ./asf-config:/app/asf/config
      - ./asf-plugins:/app/asf/plugins
    depends_on:
      - asf
